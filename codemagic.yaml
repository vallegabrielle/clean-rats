workflows:

  ios-preview:
    name: iOS › TestFlight (preview)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gdvll.cleanrats
      groups:
        - app_env
        - app
      node: v20

    cache:
      cache_paths:
        - $HOME/.npm
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Write GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST_BASE64 | base64 --decode \
            > $CM_BUILD_DIR/GoogleService-Info.plist

      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install

      - name: Copy GoogleService-Info.plist into ios folder
        script: |
          cp $CM_BUILD_DIR/GoogleService-Info.plist ios/CleanRats/GoogleService-Info.plist

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/CleanRats.xcworkspace \
            --scheme CleanRats

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  ios-production:
    name: iOS › App Store (production)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gdvll.cleanrats
      groups:
        - app_env
        - app
      node: v20

    cache:
      cache_paths:
        - $HOME/.npm
        - $CM_BUILD_DIR/node_modules
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Write GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST_BASE64 | base64 --decode \
            > $CM_BUILD_DIR/GoogleService-Info.plist

      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install

      - name: Copy GoogleService-Info.plist into ios folder
        script: |
          cp $CM_BUILD_DIR/GoogleService-Info.plist ios/CleanRats/GoogleService-Info.plist

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/CleanRats.xcworkspace \
            --scheme CleanRats

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true
